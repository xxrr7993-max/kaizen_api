spring.application.name=kaizen_api
server.port=8080
server.servlet.context-path=/api/v1

# Database
# Railway injeta PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automaticamente
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:kaizen_db}
spring.datasource.username=${PGUSER:rrxx}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000